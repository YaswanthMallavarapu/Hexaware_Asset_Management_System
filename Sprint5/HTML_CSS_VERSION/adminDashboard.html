<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="./styles/styles.css">
    <title>Admin Dashboard</title>
</head>
<body>
    <div class="row p-1">
        <!-- content -->
        <div class="col-lg-8 mt-2 p-4">
            <div class="row">
                <div class="col-md-6">
                    <div class="card">
                        <div class="widget-title">
                            <p>manager-icon</p>
                        </div>
                        <div class="widget-number ">
                            <p>12</p>
                        </div>
                        <div class="matter">
                            <p>Total Mnagers</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card">
                        <div class="widget-title">
                            <p>asset-category-icon</p>
                        </div>
                        <div class="widget-number asset">
                            <p>12</p>
                        </div>
                        <div class="matter">
                            <p>Total asset categories</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row mt-4">
                <div class="col-md-6">
                    <div class="card">
                        <div class="widget-title">
                            <p>assets</p>
                        </div>
                        <div class="widget-number asset-request">
                            <p>1263</p>
                        </div>
                        <div class="matter">
                            <p>Total assets</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card">
                        <div class="widget-title">
                            <p>Admins</p>
                        </div>
                        <div class="widget-number service-request">
                            <p>4</p>
                        </div>
                        <div class="matter">
                            <p>Total Admins</p>
                        </div>
                    </div>
                </div>
            </div>

           

        </div>
    </div>
</body>
</html>
