<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Asset Categories</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h4 class="mb-0">Asset Categories</h4>
            <small class="text-muted">Manage your asset categories</small>
        </div>
        <button class="btn btn-primary">Add Category</button>
    </div>

    <!-- Row 1 -->
    <div class="row">
        <div class="col-md-6 mb-3">
            <div class="border rounded p-3 bg-white">
                <strong>Laptops</strong><br>
                <small class="text-muted">Electronic Devices</small>
                <p class="mb-1 mt-2">250 Assets</p>
                <span class="text-success">Active</span>
            </div>
        </div>

        <div class="col-md-6 mb-3">
            <div class="border rounded p-3 bg-white">
                <strong>Printers</strong><br>
                <small class="text-muted">Office Equipment</small>
                <p class="mb-1 mt-2">45 Assets</p>
                <span class="text-success">Active</span>
            </div>
        </div>
    </div>

    <!-- Row 2 -->
    <div class="row">
        <div class="col-md-6 mb-3">
            <div class="border rounded p-3 bg-white">
                <strong>Furniture</strong><br>
                <small class="text-muted">Office Infrastructure</small>
                <p class="mb-1 mt-2">180 Assets</p>
                <span class="text-warning">Inactive</span>
            </div>
        </div>

        <div class="col-md-6 mb-3">
            <div class="border rounded p-3 bg-white">
                <strong>Mobile Phones</strong><br>
                <small class="text-muted">Communication Devices</small>
                <p class="mb-1 mt-2">95 Assets</p>
                <span class="text-success">Active</span>
            </div>
        </div>
    </div>

</div>

</body>
</html>
